spring:
  datasource:
    url: jdbc:mysql://localhost:3306/dduk_erp?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
    username: root
    password: password # 본인의 로컬 DB 비밀번호로 변경하세요
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update # 엔티티 변경 시 자동으로 테이블 수정
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# JWT 설정 커스텀
jwt:
  # 512bit 이상 길이의 시크릿 키 권장
  secret: dduk-erp-super-secret-key-for-jwt-authentication-dduk-erp-super-secret-key-for-jwt-authentication
  expiration: 86400000 # 토큰 만료 시간 (24시간)
