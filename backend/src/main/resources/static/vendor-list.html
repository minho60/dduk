<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DDUK ERP - 거래처 목록 조회</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: "#fdf7f7",
                            100: "#f8eded",
                            500: "#8b3a3a",
                            600: "#722f2f"
                        }
                    },
                    boxShadow: {
                        premium: "0 20px 50px rgba(31, 41, 55, 0.08)"
                    }
                }
            }
        };
    </script>
</head>
<body class="bg-[#f6f7f8] text-slate-900 antialiased">
<div class="min-h-screen lg:grid lg:grid-cols-[280px_minmax(0,1fr)]">
    <aside class="border-b border-slate-200 bg-white lg:min-h-screen lg:border-b-0 lg:border-r">
        <div class="flex h-full flex-col px-5 py-6">
            <div class="mb-8 flex items-center justify-between">
                <div>
                    <p class="text-xs font-semibold uppercase tracking-[0.18em] text-brand-500">DDUK ERP</p>
                    <h1 class="mt-1 text-2xl font-black tracking-tight text-slate-950">Inventory</h1>
                </div>
                <a href="/vendor-list.html" class="grid h-10 w-10 place-items-center rounded-xl bg-slate-100 text-sm font-bold text-slate-600" title="Home">홈</a>
            </div>

            <nav class="space-y-5" data-nav></nav>

            <section class="mt-8 rounded-2xl border border-slate-200 bg-white p-4 shadow-sm lg:mt-auto">
                <div class="flex items-center gap-3">
                    <div class="grid h-10 w-10 place-items-center rounded-xl bg-brand-100 text-sm font-black text-brand-600">ERP</div>
                    <div class="min-w-0">
                        <p class="truncate text-sm font-bold text-slate-900" data-user-name>-</p>
                        <p class="text-xs font-medium text-slate-500" data-role>-</p>
                    </div>
                </div>
                <dl class="mt-4 grid grid-cols-[64px_1fr] gap-2 text-xs">
                    <dt class="text-slate-400">아이디</dt>
                    <dd class="truncate font-semibold text-slate-700" data-login-id>-</dd>
                </dl>
                <button type="button" data-action="logout" class="mt-4 h-10 w-full rounded-xl bg-brand-500 text-sm font-bold text-white transition hover:bg-brand-600">로그아웃</button>
            </section>
        </div>
    </aside>

    <main class="min-w-0 px-5 py-6 sm:px-8 lg:px-10">
        <header class="mb-7">
            <p class="mb-2 text-xs font-bold uppercase tracking-[0.18em] text-brand-500">Vendor Management</p>
            <h2 class="text-3xl font-black tracking-tight text-slate-950" data-page-title>거래처 목록 조회</h2>
            <p class="mt-2 max-w-3xl text-sm leading-6 text-slate-500" data-page-description>거래처명, 대표명, 전화번호, 사업자번호로 거래처를 검색합니다.</p>
        </header>

        <section class="mb-6 grid gap-4 md:grid-cols-3" data-summary-cards></section>

        <section class="rounded-2xl border border-slate-200 bg-white p-5 shadow-premium">
            <form id="searchForm" class="grid gap-4 md:grid-cols-2 xl:grid-cols-4">
                <label class="block">
                    <span class="mb-2 block text-sm font-bold text-slate-700">거래처명</span>
                    <input id="name" placeholder="예: OO식자재" class="h-11 w-full rounded-xl border border-slate-200 bg-slate-50 px-3 text-sm outline-none transition focus:border-brand-500 focus:bg-white focus:ring-4 focus:ring-brand-100">
                </label>
                <label class="block">
                    <span class="mb-2 block text-sm font-bold text-slate-700">대표명</span>
                    <input id="representativeName" placeholder="예: 홍길동" class="h-11 w-full rounded-xl border border-slate-200 bg-slate-50 px-3 text-sm outline-none transition focus:border-brand-500 focus:bg-white focus:ring-4 focus:ring-brand-100">
                </label>
                <label class="block">
                    <span class="mb-2 block text-sm font-bold text-slate-700">전화번호</span>
                    <input id="contactPhone" placeholder="예: 010-1234" class="h-11 w-full rounded-xl border border-slate-200 bg-slate-50 px-3 text-sm outline-none transition focus:border-brand-500 focus:bg-white focus:ring-4 focus:ring-brand-100">
                </label>
                <label class="block">
                    <span class="mb-2 block text-sm font-bold text-slate-700">사업자번호</span>
                    <input id="businessRegistrationNo" placeholder="예: 123-45-67890" class="h-11 w-full rounded-xl border border-slate-200 bg-slate-50 px-3 text-sm outline-none transition focus:border-brand-500 focus:bg-white focus:ring-4 focus:ring-brand-100">
                </label>

                <div class="flex flex-col gap-2 md:col-span-2 xl:col-span-4 sm:flex-row sm:justify-end">
                    <button type="button" id="resetBtn" class="h-11 rounded-xl border border-slate-200 bg-white px-5 text-sm font-bold text-slate-700 transition hover:bg-slate-50">초기화</button>
                    <button type="submit" class="h-11 rounded-xl bg-brand-500 px-5 text-sm font-bold text-white transition hover:bg-brand-600">거래처 조회</button>
                </div>
            </form>
        </section>

        <section class="mt-6 rounded-2xl border border-slate-200 bg-white shadow-premium">
            <div class="flex items-center justify-between gap-4 border-b border-slate-100 px-5 py-4">
                <div>
                    <h3 class="text-base font-black text-slate-950">조회 결과</h3>
                    <p id="resultCount" class="mt-1 text-sm text-slate-500">검색 조건을 입력하거나 전체 조회를 실행하세요.</p>
                </div>
                <a href="/vendor-create.html" class="h-10 rounded-xl bg-slate-950 px-4 py-2.5 text-sm font-bold text-white transition hover:bg-brand-600">새 거래처 등록</a>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full min-w-[960px] border-collapse">
                    <thead class="bg-slate-50 text-left text-xs font-black uppercase tracking-wide text-slate-500">
                    <tr>
                        <th class="px-4 py-3">거래처 코드</th>
                        <th class="px-4 py-3">거래처명</th>
                        <th class="px-4 py-3">대표명</th>
                        <th class="px-4 py-3">전화번호</th>
                        <th class="px-4 py-3">사업자번호</th>
                        <th class="px-4 py-3">상태</th>
                        <th class="px-4 py-3 text-right">상세</th>
                    </tr>
                    </thead>
                    <tbody id="resultBody" class="divide-y divide-slate-100 text-sm"></tbody>
                </table>
            </div>

            <div id="message" class="m-5 min-h-11 rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm font-semibold text-slate-500" aria-live="polite">거래처 목록 조회 페이지입니다.</div>
        </section>
    </main>
</div>

<script src="/services/common/app-shell.js"></script>
<script>
    window.ddukAppShell.hydratePage({
        title: "거래처 목록 조회",
        description: "거래처명, 대표명, 전화번호, 사업자번호로 거래처를 검색합니다.",
        navItems: [
            {
                label: "발주 관리",
                children: [
                    { href: "/purchase-order-request.html", label: "발주 생성" },
                    { href: "#", label: "발주 상태 변경" },
                    { href: "#", label: "발주서 조회" }
                ]
            },
            {
                label: "거래처 관리",
                children: [
                    { href: "/vendor-create.html", label: "거래처 등록" },
                    { href: "/vendor-list.html", label: "거래처 목록 조회", current: true },
                    { href: "#", label: "거래처 활성/비활성 변경" },
                    { href: "#", label: "거래처별 발주 내역 조회" }
                ]
            },
            { href: "#", label: "입고 등록" }
        ],
        cards: [
            { title: "검색 조건", value: "4개", description: "거래처명/대표명/전화번호/사업자번호" },
            { title: "조회 API", value: "search", description: "조건 검색" },
            { title: "정렬", value: "최신순", description: "ID 내림차순" }
        ]
    });

    const previewSession = {
        userName: localStorage.getItem("userName") || "미리보기 계정",
        loginId: localStorage.getItem("loginId") || "inventory_preview",
        role: localStorage.getItem("role") || "INVENTORY"
    };
    document.querySelector("[data-user-name]").textContent = previewSession.userName;
    document.querySelector("[data-login-id]").textContent = previewSession.loginId;
    document.querySelector("[data-role]").textContent = previewSession.role;
    document.querySelector("[data-action='logout']").addEventListener("click", () => {
        localStorage.removeItem("token");
        localStorage.removeItem("loginId");
        localStorage.removeItem("role");
        localStorage.removeItem("userName");
        location.reload();
    });

    const form = document.getElementById("searchForm");
    const resultBody = document.getElementById("resultBody");
    const resultCount = document.getElementById("resultCount");
    const message = document.getElementById("message");
    const searchFields = ["name", "representativeName", "contactPhone", "businessRegistrationNo"];

    function valueOf(id) {
        return document.getElementById(id).value.trim();
    }

    function text(value) {
        return value || "-";
    }

    function setMessage(textValue, type = "") {
        const base = "m-5 min-h-11 rounded-xl border px-4 py-3 text-sm font-semibold";
        const state = type === "ok"
            ? "border-emerald-200 bg-emerald-50 text-emerald-700"
            : type === "error"
                ? "border-rose-200 bg-rose-50 text-rose-700"
                : "border-slate-200 bg-slate-50 text-slate-500";
        message.className = `${base} ${state}`;
        message.textContent = textValue;
    }

    function buildSearchUrl() {
        const params = new URLSearchParams();
        searchFields.forEach((field) => {
            const value = valueOf(field);
            if (value) {
                params.set(field, value);
            }
        });

        const query = params.toString();
        return `${window.location.origin}/api/v1/inventory/vendors/search${query ? `?${query}` : ""}`;
    }

    function renderRows(vendors) {
        if (!vendors.length) {
            resultBody.innerHTML = `
                <tr>
                    <td class="px-4 py-8 text-center text-sm font-semibold text-slate-400" colspan="7">조회된 거래처가 없습니다.</td>
                </tr>
            `;
            return;
        }

        resultBody.innerHTML = vendors.map((vendor) => `
            <tr class="transition hover:bg-slate-50">
                <td class="px-4 py-3 font-black text-slate-950">${text(vendor.vendorCode)}</td>
                <td class="px-4 py-3 font-bold text-slate-800">${text(vendor.name)}</td>
                <td class="px-4 py-3 text-slate-600">${text(vendor.representativeName)}</td>
                <td class="px-4 py-3 text-slate-600">${text(vendor.contactPhone)}</td>
                <td class="px-4 py-3 text-slate-600">${text(vendor.businessRegistrationNo)}</td>
                <td class="px-4 py-3">
                    <span class="rounded-full border border-emerald-200 bg-emerald-50 px-2.5 py-1 text-xs font-bold text-emerald-700">${text(vendor.status)}</span>
                </td>
                <td class="px-4 py-3 text-right">
                    <a href="/vendor-detail.html?vendorId=${vendor.id}" class="rounded-xl border border-slate-200 bg-white px-3 py-2 text-xs font-bold text-slate-700 transition hover:bg-slate-50">상세 조회</a>
                </td>
            </tr>
        `).join("");
    }

    async function searchVendors(event) {
        if (event) {
            event.preventDefault();
        }

        try {
            setMessage("거래처 목록을 조회하는 중입니다.");
            const token = localStorage.getItem("token");
            const headers = {};
            if (token) {
                headers.Authorization = `Bearer ${token}`;
            }

            const response = await fetch(buildSearchUrl(), { headers });
            const responseText = await response.text();
            if (!response.ok) {
                throw new Error(responseText || `HTTP ${response.status}`);
            }

            const vendors = responseText ? JSON.parse(responseText) : [];
            renderRows(vendors);
            resultCount.textContent = `${vendors.length}건이 조회되었습니다.`;
            setMessage("거래처 목록 조회가 완료되었습니다.", "ok");
        } catch (error) {
            renderRows([]);
            resultCount.textContent = "조회 중 오류가 발생했습니다.";
            setMessage(`조회 실패: ${error.message}`, "error");
        }
    }

    form.addEventListener("submit", searchVendors);
    document.getElementById("resetBtn").addEventListener("click", () => {
        form.reset();
        searchVendors();
    });

    searchVendors();
</script>
</body>
</html>
