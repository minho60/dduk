<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DDUK ERP - 서버 모니터링</title>
    <link rel="stylesheet" href="../../styles/common/app-shell.css">
    <link rel="stylesheet" href="../../styles/admin/admin-pages.css">
</head>
<body>
    <div class="app-shell">
        <aside class="app-sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <img src="../../assets/ERP-ROGO.svg" alt="DDUK ERP Logo">
                    <h1>DDUK ERP</h1>
                    <button class="home-btn" title="Home" onclick="location.href='../../dashboard.html'">🏠</button>
                </div>
            </div>

            <nav data-nav></nav>
            
            <div class="sidebar-footer">
                <div class="app-user">
                    <div class="user-info">
                        <span class="user-name" data-user-name>-</span>
                        <span class="user-role" data-role>-</span>
                    </div>
                    <button type="button" data-action="logout" title="Logout">로그아웃</button>
                </div>
            </div>
        </aside>

        <main class="app-main">
            <header class="app-header">
                <div>
                    <h2 data-page-title>서버 모니터링</h2>
                    <p data-page-description>백엔드 및 AI 서버의 가동 상태를 실시간으로 확인합니다.</p>
                </div>
                <div class="actions">
                    <button type="button" class="secondary">새로고침</button>
                </div>
            </header>

            <div class="monitor-grid">
                <!-- CPU Usage -->
                <article class="monitor-card">
                    <h3>CPU 사용률</h3>
                    <div class="gauge-container">
                        <div class="gauge-value">12%</div>
                        <div class="gauge-label">Intel(R) Xeon(R) Gold 6248R</div>
                    </div>
                </article>

                <!-- Memory Usage -->
                <article class="monitor-card">
                    <h3>메모리 사용률</h3>
                    <div class="gauge-container">
                        <div class="gauge-value">45%</div>
                        <div class="gauge-label">사용 중: 7.2GB / 전체: 16.0GB</div>
                    </div>
                </article>

                <!-- Disk Usage -->
                <article class="monitor-card">
                    <h3>디스크 사용률</h3>
                    <div class="gauge-container">
                        <div class="gauge-value">68%</div>
                        <div class="gauge-label">사용 중: 340GB / 전체: 500GB</div>
                    </div>
                </article>
            </div>

            <section class="panel mt-8">
                <h3>서비스 상태</h3>
                <div class="service-status">
                    <span>ERP API Server (Spring Boot)</span>
                    <div style="display: flex; align-items: center; gap: 0.5rem;">
                        <span style="font-size: 0.85rem; color: #10B981;">정상 가동 중</span>
                        <div class="status-indicator"></div>
                    </div>
                </div>
                <div class="service-status">
                    <span>AI Server (Flask)</span>
                    <div style="display: flex; align-items: center; gap: 0.5rem;">
                        <span style="font-size: 0.85rem; color: #10B981;">정상 가동 중</span>
                        <div class="status-indicator"></div>
                    </div>
                </div>
                <div class="service-status">
                    <span>Database (TiDB)</span>
                    <div style="display: flex; align-items: center; gap: 0.5rem;">
                        <span style="font-size: 0.85rem; color: #10B981;">정상 가동 중</span>
                        <div class="status-indicator"></div>
                    </div>
                </div>
                <div class="service-status">
                    <span>RPA Runner</span>
                    <div style="display: flex; align-items: center; gap: 0.5rem;">
                        <span class="font-sm text-muted">대기 중</span>
                        <div class="status-indicator inactive"></div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Scripts -->
    <script src="../../services/common/session.js"></script>
    <script src="../../services/common/app-shell.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            window.ddukAppShell.hydratePage({
                title: "서버 모니터링",
                description: "백엔드 및 AI 서버의 가동 상태를 실시간으로 확인합니다."
            });
        });
    </script>
</body>
</html>
