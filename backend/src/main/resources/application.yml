spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate # 처음에만 none, 이후엔 validate
    show-sql: true 
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
# JWT 설정
jwt:
  # 512bit 이상 길이의 시크릿을 환경변수로 주입
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}
