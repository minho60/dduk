<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DDUK ERP - 급여 계산</title>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <link rel="stylesheet" href="../../../styles/common/app-shell.css">
    <link rel="stylesheet" href="../../../styles/common/dashboard.css">
    <link rel="stylesheet" href="../../../styles/hr/hr-backend-pages.css">
</head>
<body data-hr-page="payroll-list">
    <aside data-dduk-sidebar></aside>
    <div class="main_wrap">
        <main class="app-main hr_page">
            <header class="hr_topbar">
                <button class="sidebar_icon_btn dduk-inline-027" onclick="toggleSidebar()" id="mobile_menu_btn" aria-label="메뉴">
                    <i class="dduk-inline-028" data-lucide="menu"></i>
                </button>
                <div class="hr_title">
                    <h2>급여 계산</h2>
                    <p>POST /api/v1/hr/payroll/calculate API로 직원 급여를 계산하고 저장합니다.</p>
                </div>
                <div class="hr_actions">
                    <a class="hr_button" href="./detail.html"><i data-lucide="workflow"></i>상태 전환</a>
                </div>
            </header>

            <section class="hr_grid">
                <form class="hr_card span_4" id="payroll_form">
                    <div class="hr_card_header">
                        <h3>계산 입력</h3>
                        <span class="hr_badge warn">직원 ID 필요</span>
                    </div>
                    <div class="hr_form_grid" style="grid-template-columns: 1fr;">
                        <div class="hr_field">
                            <label for="employee_id">직원 ID</label>
                            <input class="hr_input" id="employee_id" type="number" min="1" placeholder="예: 1" required>
                        </div>
                        <div class="hr_field">
                            <label for="pay_month">지급월</label>
                            <input class="hr_input" id="pay_month" type="month" required>
                        </div>
                        <div class="hr_field">
                            <label for="overtime_hours">연장근무 시간</label>
                            <input class="hr_input" id="overtime_hours" type="number" min="0" step="0.5" value="0">
                        </div>
                        <div class="hr_field">
                            <label for="bonus">상여금</label>
                            <input class="hr_input" id="bonus" type="number" min="0" step="1" value="0">
                        </div>
                        <div class="hr_field">
                            <label for="allowance">기타 수당</label>
                            <input class="hr_input" id="allowance" type="number" min="0" step="1" value="0">
                        </div>
                    </div>
                    <div class="hr_actions" style="margin-top: 16px;">
                        <button class="hr_button primary" type="submit"><i data-lucide="calculator"></i>계산 실행</button>
                    </div>
                </form>

                <article class="hr_card span_8">
                    <div class="hr_card_header">
                        <h3>계산 결과</h3>
                        <span class="hr_badge" id="payroll_status">-</span>
                    </div>
                    <div class="hr_grid">
                        <div class="hr_card span_3"><div class="hr_kpi_label">급여 ID</div><div class="hr_kpi_value" id="payroll_id">-</div></div>
                        <div class="hr_card span_3"><div class="hr_kpi_label">직원</div><div class="hr_kpi_value" id="payroll_employee">-</div></div>
                        <div class="hr_card span_3"><div class="hr_kpi_label">지급월</div><div class="hr_kpi_value" id="payroll_month">-</div></div>
                        <div class="hr_card span_3"><div class="hr_kpi_label">실지급액</div><div class="hr_kpi_value" id="payroll_net">-</div></div>
                    </div>
                    <table class="hr_table" style="margin-top: 16px;">
                        <tbody>
                            <tr><th>기본급</th><td class="amount" id="payroll_base">-</td></tr>
                            <tr><th>수당 합계</th><td class="amount" id="payroll_allowance">-</td></tr>
                            <tr><th>공제 합계</th><td class="amount" id="payroll_deduction">-</td></tr>
                        </tbody>
                    </table>
                    <pre class="hr_result" id="payroll_trace" style="margin-top: 16px;">계산 trace가 여기에 표시됩니다.</pre>
                    <div class="hr_status" id="page_status" style="margin-top: 12px;"></div>
                    <div class="hr_notice" style="margin-top: 12px;">급여 목록 조회 API는 아직 백엔드에 없어서, 최근 계산 결과를 브라우저에 임시 보관해 상세/대조 화면에서 사용합니다.</div>
                </article>
            </section>
        </main>
    </div>

    <script src="../../../services/common/session.js"></script>
    <script src="../../../services/common/app-shell.js"></script>
    <script src="../../../services/common/sidebar.js"></script>
    <script type="module" src="../../../services/hr/hr-backend-pages.js"></script>
</body>
</html>
