<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DDUK ERP - 급여 대장</title>
    <link rel="stylesheet" href="../../../styles/common/app-shell.css">
    <link rel="stylesheet" href="../../../styles/common/erp-components.css">
</head>
<body>
    <div class="app-shell">
        <aside class="app-sidebar">
            <h1>DDUK ERP</h1>
            <nav data-nav></nav>
        </aside>
        <main class="app-main">
            <header class="app-header">
                <div>
                    <h2 data-page-title>급여 대장 관리</h2>
                    <p data-page-description>직원별 급여 산출 현황 및 회계 전표 연동 상태를 관리합니다.</p>
                </div>
                <section class="app-user">
                    <dl>
                        <dt>이름</dt><dd data-user-name>-</dd>
                        <dt>아이디</dt><dd data-login-id>-</dd>
                        <dt>권한</dt><dd data-role>-</dd>
                    </dl>
                    <button type="button" data-action="logout">로그아웃</button>
                </section>
            </header>

            <div class="payroll_page_container" style="padding: 24px;">
                <!-- Summary Cards -->
                <div class="payroll_summary" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px;">
                    <div class="erp_widget" style="padding: 20px; background: #fff; border-radius: 8px; border: 1px solid #e2e8f0;">
                        <div style="font-size: 0.75rem; color: #64748b;">이번 달 총 지급액</div>
                        <div id="summary_gross" style="font-size: 1.5rem; font-weight: 700; color: #1e293b;">₩ 0</div>
                    </div>
                    <div class="erp_widget" style="padding: 20px; background: #fff; border-radius: 8px; border: 1px solid #e2e8f0;">
                        <div style="font-size: 0.75rem; color: #64748b;">공제/세금 합계</div>
                        <div id="summary_deduction" style="font-size: 1.5rem; font-weight: 700; color: #e53e3e;">₩ 0</div>
                    </div>
                    <div id="summary_pending" class="erp_widget" style="padding: 20px; background: #fff; border-radius: 8px; border: 1px solid #e2e8f0;">
                        <div style="font-size: 0.75rem; color: #64748b;">승인 대기</div>
                        <div style="font-size: 1.5rem; font-weight: 700; color: #d97706;">0 건</div>
                    </div>
                    <div id="summary_unposted" class="erp_widget" style="padding: 20px; background: #fff; border-radius: 8px; border: 1px solid #e2e8f0;">
                        <div style="font-size: 0.75rem; color: #64748b;">미전송 전표</div>
                        <div style="font-size: 1.5rem; font-weight: 700; color: #3182ce;">0 건</div>
                    </div>
                </div>

                <!-- Filters -->
                <section id="payroll_filter_container" style="margin-bottom: 24px;"></section>

                <!-- Action Bar -->
                <div style="display: flex; gap: 8px; margin-bottom: 16px;">
                    <button id="btn_batch_calculate" class="erp_button erp_button_primary">일괄 급여 계산</button>
                    <button id="btn_export_csv" class="erp_button erp_button_secondary">급여 대장 내보내기</button>
                </div>

                <!-- Table -->
                <section id="payroll_table_container" style="background: #fff; border: 1px solid #e2e8f0; border-radius: 8px;"></section>
            </div>
        </main>
    </div>

    <script src="../../../services/common/session.js"></script>
    <script src="../../../services/common/app-shell.js"></script>
    <script type="module">
        import { BaseFilter } from '../../../components/common/BaseFilter.js';
        import { BaseTable } from '../../../components/common/BaseTable.js';
        import { payrollService } from '../../../services/hr/payroll/payroll-service.js';
        import { formatCurrency, getStatusBadgeClass } from '../../../services/common/formatters.js';

        let table = null;

        async function init() {
            const session = window.ddukSession.requireRole(["ADMIN", "HR", "FINANCE"]);
            if (!session) return;
            window.ddukSession.bindShell(session);

            window.ddukAppShell.hydratePage({
                navItems: [
                    { href: "../../hr/dashboard.html", label: "인사/회계 메인" },
                    { href: "../accounting/dashboard.html", label: "회계 관리" },
                    { href: "./list.html", label: "급여 대장", current: true },
                    { href: "../accounting/reports.html", label: "회계 리포트" }
                ]
            });

            initFilter();
            initTable();
            loadData();
        }

        function initFilter() {
            const filter = new BaseFilter({
                container: document.getElementById('payroll_filter_container'),
                fields: [
                    { id: 'yearMonth', label: '지급월', type: 'select', options: [
                        { value: '2026-05', label: '2026년 05월' },
                        { value: '2026-04', label: '2026년 04월' }
                    ]},
                    { id: 'status', label: '상태', type: 'select', options: [
                        { value: '', label: '전체' },
                        { value: 'DRAFT', label: '작성중' },
                        { value: 'APPROVED', label: '승인완료' },
                        { value: 'POSTED', label: '전표전송완료' }
                    ]},
                    { id: 'keyword', label: '직원명', type: 'text' }
                ],
                onFilter: (values) => loadData(values)
            });
            filter.render();
        }

        function initTable() {
            table = new BaseTable({
                container: document.getElementById('payroll_table_container'),
                columns: [
                    { key: 'id', label: 'ID', width: '120px' },
                    { key: 'employeeName', label: '직원명', width: '120px' },
                    { key: 'yearMonth', label: '지급월', align: 'center' },
                    { key: 'grossPay', label: '지급총액', align: 'right', render: (v, row) => formatCurrency(row.amounts.grossPay) },
                    { key: 'netPay', label: '실지급액', align: 'right', render: (v, row) => formatCurrency(row.amounts.netPay) },
                    { key: 'status', label: '상태', align: 'center', render: (v) => `<span class="erp_badge ${getStatusBadgeClass(v)}">${v}</span>` },
                    { key: 'revision', label: '리비전', align: 'center', render: (v) => `v${v}` }
                ],
                onRowClick: (row) => {
                    location.href = `./detail.html?id=${row.id}`;
                }
            });
        }

        async function loadData(filters = {}) {
            table.setLoading(true);
            const res = await payrollService.getPayrolls(filters);
            if (res.success) {
                table.setData(res.data);
                updateSummary(res.data);
            }
            table.setLoading(false);
        }

        function updateSummary(data) {
            const gross = data.reduce((acc, r) => acc + r.amounts.grossPay, 0);
            const deduction = data.reduce((acc, r) => acc + r.amounts.totalDeductions, 0);
            document.getElementById('summary_gross').textContent = formatCurrency(gross);
            document.getElementById('summary_deduction').textContent = formatCurrency(deduction);
        }

        init();
    </script>
</body>
</html>
