<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DDUK ERP - 준비중</title>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <link rel="stylesheet" href="../../../styles/common/app-shell.css">
    <link rel="stylesheet" href="../../../styles/common/dashboard.css">
    <style>
        .wip_container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: calc(100vh - 120px);
            text-align: center;
            color: var(--text-secondary);
        }
        .wip_icon {
            width: 64px;
            height: 64px;
            color: var(--text-muted);
            margin-bottom: 24px;
            opacity: 0.5;
        }
        .wip_title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 12px;
        }
        .wip_desc {
            font-size: 1rem;
            max-width: 400px;
            line-height: 1.6;
        }
    </style>
</head>
<body data-hr-page="accounting-wip">
    <aside data-dduk-sidebar></aside>
    <div class="main_wrap">
        <main class="app-main hr_page">
            <header class="hr_topbar">
                <button class="sidebar_icon_btn dduk-inline-027" onclick="toggleSidebar()" id="mobile_menu_btn" aria-label="메뉴">
                    <i class="dduk-inline-028" data-lucide="menu"></i>
                </button>
            </header>

            <section class="wip_container">
                <i class="wip_icon" data-lucide="wrench"></i>
                <h2 class="wip_title">기능 준비중입니다</h2>
                <p class="wip_desc">이 메뉴는 현재 개발 진행 중이거나 아직 활성화되지 않은 기능입니다. 곧 업데이트될 예정입니다.</p>
                <div style="margin-top: 32px;">
                    <a class="hr_button primary" href="dashboard.html">대시보드로 돌아가기</a>
                </div>
            </section>
        </main>
    </div>

    <script src="../../../services/common/session.js"></script>
    <script src="../../../services/common/app-shell.js"></script>
    <script src="../../../services/common/sidebar.js"></script>
</body>
</html>
