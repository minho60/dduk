<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DDUK ERP - 회계 대시보드</title>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <link rel="stylesheet" href="../../../styles/common/app-shell.css">
    <link rel="stylesheet" href="../../../styles/common/dashboard.css">
    <link rel="stylesheet" href="../../../styles/hr/hr-backend-pages.css">
</head>
<body data-hr-page="accounting-dashboard">
    <aside data-dduk-sidebar></aside>
    <div class="main_wrap">
        <main class="app-main hr_page">
            <header class="hr_topbar">
                <button class="sidebar_icon_btn dduk-inline-027" onclick="toggleSidebar()" id="mobile_menu_btn" aria-label="메뉴">
                    <i class="dduk-inline-028" data-lucide="menu"></i>
                </button>
                <div class="hr_title">
                    <h2>회계 대시보드</h2>
                    <p>백엔드 재무상태표와 손익계산서 API 기준으로 회계 현황을 확인합니다.</p>
                </div>
                <div class="hr_actions">
                    <button class="hr_button" id="btn_refresh_dashboard" type="button"><i data-lucide="refresh-cw"></i>새로고침</button>
                    <a class="hr_button primary" href="./transactions.html"><i data-lucide="file-plus"></i>전표 등록</a>
                </div>
            </header>

            <section class="hr_grid">
                <article class="hr_card span_3">
                    <div class="hr_kpi_label">자산 합계</div>
                    <div class="hr_kpi_value" id="kpi_assets">-</div>
                    <div class="hr_kpi_hint">GET /report/balance-sheet</div>
                </article>
                <article class="hr_card span_3">
                    <div class="hr_kpi_label">부채 합계</div>
                    <div class="hr_kpi_value" id="kpi_liabilities">-</div>
                    <div class="hr_kpi_hint">계정 잔액 집계</div>
                </article>
                <article class="hr_card span_3">
                    <div class="hr_kpi_label">자본 합계</div>
                    <div class="hr_kpi_value" id="kpi_equity">-</div>
                    <div class="hr_kpi_hint" id="balance_state">-</div>
                </article>
                <article class="hr_card span_3">
                    <div class="hr_kpi_label">순손익</div>
                    <div class="hr_kpi_value" id="kpi_net_income">-</div>
                    <div class="hr_kpi_hint">GET /report/profit-loss</div>
                </article>

                <article class="hr_card span_6">
                    <div class="hr_card_header">
                        <h3>자산 계정</h3>
                        <span class="hr_badge">Balance Sheet</span>
                    </div>
                    <table class="hr_table">
                        <thead><tr><th>코드</th><th>계정명</th><th class="amount">잔액</th></tr></thead>
                        <tbody id="asset_rows"></tbody>
                    </table>
                </article>
                <article class="hr_card span_6">
                    <div class="hr_card_header">
                        <h3>비용 계정</h3>
                        <span class="hr_badge">Profit & Loss</span>
                    </div>
                    <table class="hr_table">
                        <thead><tr><th>코드</th><th>계정명</th><th class="amount">잔액</th></tr></thead>
                        <tbody id="expense_rows"></tbody>
                    </table>
                </article>
                <article class="hr_card">
                    <div class="hr_status" id="page_status"></div>
                </article>
            </section>
        </main>
    </div>

    <script src="../../../services/common/session.js"></script>
    <script src="../../../services/common/app-shell.js"></script>
    <script src="../../../services/common/sidebar.js"></script>
    <script type="module" src="../../../services/hr/hr-backend-pages.js"></script>
</body>
</html>
