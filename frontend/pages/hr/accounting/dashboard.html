<script type="module">

                ]
            });

        }

        function loadKPIs() {

            document.getElementById('kpi_net_income').textContent = formatCurrency(pl.netIncome);
            document.getElementById('kpi_assets').textContent = formatCurrency(bs.sections[0].total);
