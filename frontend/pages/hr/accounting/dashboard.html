<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DDUK ERP - 회계 운영 상황실</title>
    <link rel="stylesheet" href="../../../styles/common/app-shell.css">
    <link rel="stylesheet" href="../../../styles/common/erp-components.css">
    <style>
        .dash_grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; padding: 24px; }
        .kpi_card { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 24px; }
        .kpi_label { font-size: 0.75rem; color: #64748b; margin-bottom: 8px; }
        .kpi_value { font-size: 1.5rem; font-weight: 700; color: #1e293b; }
        .chart_section { grid-column: span 3; background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 24px; }
        .status_section { grid-column: span 1; background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 24px; }
    </style>
</head>
<body>
    <div class="app-shell">
        <aside class="app-sidebar">
            <h1>DDUK ERP</h1>
            <nav data-nav></nav>
        </aside>
        <main class="app-main">
            <header class="app-header">
                <div>
                    <h2 data-page-title>재무 운영 상황실 (Financial Ops)</h2>
                    <p data-page-description>전사의 재무 상태를 실시간으로 모니터링하고 마감 현황을 관리합니다.</p>
                </div>
                <div style="display: flex; gap: 8px;">
                    <button class="erp_button erp_button_primary">전표 등록</button>
                    <button class="erp_button erp_button_secondary" onclick="location.href='./fiscal-closing.html'">월 마감 실행</button>
                </div>
            </header>

            <div class="dash_grid">
                <!-- KPIs -->
                <div class="kpi_card"><div class="kpi_label">당기순이익</div><div id="kpi_net_income" class="kpi_value">₩ 0</div></div>
                <div class="kpi_card"><div class="kpi_label">유동자산 합계</div><div id="kpi_assets" class="kpi_value">₩ 0</div></div>
                <div class="kpi_card"><div class="kpi_label">미결제 전표</div><div class="kpi_value" style="color: #d97706;">3 건</div></div>
                <div class="kpi_card"><div class="kpi_label">마감 진행률</div><div class="kpi_value" style="color: #3182ce;">85%</div></div>

                <!-- Main Chart -->
                <div class="chart_section">
                    <h3 style="font-size: 0.875rem; margin-bottom: 20px;">수익/비용 추이 (Revenue vs Expense)</h3>
                    <div style="height: 300px; background: #f8fafc; border-radius: 4px; display: flex; align-items: center; justify-content: center; color: #94a3b8;">
                        [Chart Visualization Area]
                    </div>
                </div>

                <!-- Closing Status -->
                <div class="status_section">
                    <h3 style="font-size: 0.875rem; margin-bottom: 20px;">마감 체크리스트</h3>
                    <ul style="list-style: none; padding: 0; font-size: 0.875rem;">
                        <li style="margin-bottom: 12px; display: flex; justify-content: space-between;">
                            <span>전표 포스팅 완료</span><span class="erp_badge badge_success">완료</span>
                        </li>
                        <li style="margin-bottom: 12px; display: flex; justify-content: space-between;">
                            <span>급여 정산 대조</span><span class="erp_badge badge_success">완료</span>
                        </li>
                        <li style="margin-bottom: 12px; display: flex; justify-content: space-between;">
                            <span>기말 재고 반영</span><span class="erp_badge badge_warning">진행중</span>
                        </li>
                    </ul>
                </div>
            </div>
        </main>
    </div>

    <script src="../../../services/common/session.js"></script>
    <script src="../../../services/common/app-shell.js"></script>
    <script type="module">
        import { financialStatementEngine } from '../../../services/hr/accounting/financial-statement-engine.js';
        import { formatCurrency } from '../../../services/common/formatters.js';

        async function init() {
            const session = window.ddukSession.requireRole(["ADMIN", "FINANCE"]);
            if (!session) return;
            window.ddukSession.bindShell(session);

            window.ddukAppShell.hydratePage({
                navItems: [
                    { href: "../../hr/dashboard.html", label: "인사/회계 메인" },
                    { href: "./dashboard.html", label: "회계 대시보드", current: true },
                    { href: "./trial-balance.html", label: "시산표/원장" },
                    { href: "../payroll/list.html", label: "급여 관리" }
                ]
            });

            loadKPIs();
        }

        function loadKPIs() {
            const bs = financialStatementEngine.generateBalanceSheet();
            const pl = financialStatementEngine.generateProfitAndLoss();

            document.getElementById('kpi_net_income').textContent = formatCurrency(pl.netIncome);
            document.getElementById('kpi_assets').textContent = formatCurrency(bs.sections[0].total);
        }

        init();
    </script>
</body>
</html>
