<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DDUK ERP - 관리자 메인</title>
    <link rel="stylesheet" href="../../styles/common/app-shell.css">
</head>
<body>
    <div class="app-shell">
        <aside class="app-sidebar">
            <h1>DDUK ERP</h1>
            <nav data-nav></nav>
        </aside>
        <main class="app-main">
            <header class="app-header">
                <div>
                    <h2 data-page-title>관리자 메인</h2>
                    <p data-page-description>인증, 권한, 공통 운영 기능을 연결하는 시작 화면이다.</p>
                </div>
                <section class="app-user">
                    <dl>
                        <dt>이름</dt>
                        <dd data-user-name>-</dd>
                        <dt>아이디</dt>
                        <dd data-login-id>-</dd>
                        <dt>권한</dt>
                        <dd data-role>-</dd>
                    </dl>
                    <button type="button" data-action="logout">로그아웃</button>
                </section>
            </header>

            <section class="panel-grid" data-summary-cards></section>

            <section class="content-grid">
                <div class="stack">
                    <section class="panel">
                        <h3>팀 작업 시작 포인트</h3>
                        <ul data-todo-list></ul>
                    </section>
                    <section class="panel">
                        <h3>우선 연결할 API</h3>
                        <ul data-api-list></ul>
                    </section>
                </div>
                <div class="stack">
                    <section class="panel">
                        <h3>중심 테이블</h3>
                        <ul data-table-list></ul>
                    </section>
                </div>
            </section>

            <section class="panel">
                <h3>계정 생성</h3>
                <p>관리자가 계정을 만들고 역할을 부여하면 해당 도메인 업무만 접근할 수 있다.</p>
                <form id="memberCreateForm">
                    <div class="form-grid">
                        <div class="form-field">
                            <label for="memberLoginId">아이디</label>
                            <input id="memberLoginId" name="loginId" type="text" required>
                        </div>
                        <div class="form-field">
                            <label for="memberPassword">비밀번호</label>
                            <input id="memberPassword" name="password" type="password" required>
                        </div>
                        <div class="form-field">
                            <label for="memberName">이름</label>
                            <input id="memberName" name="name" type="text" required>
                        </div>
                        <div class="form-field">
                            <label for="memberRole">권한</label>
                            <select id="memberRole" name="role" required>
                                <option value="ADMIN">ADMIN</option>
                                <option value="HR">HR</option>
                                <option value="INVENTORY">INVENTORY</option>
                            </select>
                        </div>
                    </div>
                    <div class="inline-actions">
                        <button type="submit">계정 생성</button>
                        <p id="memberMessage" class="message" aria-live="polite"></p>
                    </div>
                </form>
            </section>

            <section class="panel">
                <h3>계정 목록</h3>
                <div class="table-shell">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>아이디</th>
                                <th>이름</th>
                                <th>권한</th>
                                <th>상태</th>
                                <th>생성일</th>
                                <th>관리</th>
                            </tr>
                        </thead>
                        <tbody id="memberTableBody"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script src="../../services/common/session.js"></script>
    <script src="../../services/common/app-shell.js"></script>
    <script src="../../services/common/dashboard.js"></script>
    <script src="../../services/admin/member-management.js"></script>
</body>
</html>
