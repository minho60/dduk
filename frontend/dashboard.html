<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DDUK ERP - 통합 대시보드</title>
    <link rel="stylesheet" href="styles/common/app-shell.css">
    <link rel="stylesheet" href="styles/common/dashboard.css">
</head>
<body>
    <div class="app-shell">
        <aside class="app-sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <img src="assets/ERP-ROGO.svg" alt="DDUK ERP Logo">
                    <h1>DDUK ERP</h1>
                    <button class="home-btn" title="Home">🏠</button>
                </div>
            </div>

            <nav data-nav></nav>
            
            <div class="sidebar-footer">
                <div class="app-user">
                    <div class="user-info">
                        <span class="user-name" data-user-name>-</span>
                        <span class="user-role" data-role>-</span>
                    </div>
                    <button type="button" data-action="logout" title="Logout">로그아웃</button>
                </div>
            </div>
        </aside>

        <main class="app-main">
            <header class="app-header">
                <div>
                    <h2 data-page-title>대시보드</h2>
                    <p data-page-description>시스템의 실시간 현황을 한눈에 파악합니다.</p>
                </div>
            </header>

            <!-- 상단 통계 카드 -->
            <section class="panel-grid" data-summary-cards></section>

            <!-- 중앙 대형 패널 -->
            <section class="panel chart-placeholder-container">
                <h3>실시간 지표 추이</h3>
                <div class="chart-placeholder">
                    [ 차트 라이브러리 연결 예정 영역 ]
                </div>
            </section>

            <div class="content-grid">
                <section class="panel">
                    <h3>최근 활동 및 알림</h3>
                    <ul class="stack todo-list-container" data-todo-list></ul>
                </section>

                <section class="panel">
                    <h3>관련 데이터베이스</h3>
                    <ul data-table-list></ul>
                </section>
            </div>
        </main>
    </div>

    <script src="services/common/session.js"></script>
    <script src="services/common/app-shell.js"></script>
    <script src="services/common/dashboard.js"></script>
</body>
</html>
